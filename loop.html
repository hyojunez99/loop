<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지 캐러셀</title>
    <link rel="stylesheet" href="./loop.css" />
    <script src="./loop.js" defer></script>
  </head>
  <body>
    <main>
      <ul class="slider">
        <li><img src="./assets/images/image-1.png" alt="슬라이드01" /></li>
        <li><img src="./assets/images/image-2.png" alt="슬라이드02" /></li>
        <li><img src="./assets/images/image-3.png" alt="슬라이드03" /></li>
        <li><img src="./assets/images/image-4.png" alt="슬라이드04" /></li>
        <li><img src="./assets/images/image-5.png" alt="슬라이드05" /></li>
      </ul>
    </main>
    <div class="btn-wrap">
      <button class="prev">←</button>
      <button class="next">→</button>
    </div>
    <div class="player">
      <button class="stop">멈춤</button>
      <button class="play">자동실행</button>
    </div>
  </body>
</html>
